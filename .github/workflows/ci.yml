name: Continuous Integration

on:
  push:
    branches: [main]
    tags-ignore:
      - "v*.*.*"
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Focused Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run focused tests
        # `-m "not slow"` keeps `integration` enabled so the manifest-loading
        # smoke test runs in CI, mirroring dinomaly / sam3.
        # `--no-sources` ignores [tool.uv.sources] local overrides.
        # `--locked` uses the committed uv.lock (generated with --no-sources).
        run: |
          uv run --no-sources --locked --extra dev pytest tests/ -m "not slow" -v --tb=long -ra \
            --cov=cuvis_ai_augment \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  lint:
    name: Focused Ruff Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Check formatting
        run: uv run --no-sources --locked --extra dev ruff format --check cuvis_ai_augment tests

      - name: Run ruff
        run: uv run --no-sources --locked --extra dev ruff check cuvis_ai_augment tests

  typecheck:
    name: Type checking
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run mypy
        # Non-blocking: torch stubs are incomplete; surface issues without gating CI
        # (matches dinomaly / adaclip pattern).
        run: uv run --no-sources --locked --extra dev mypy cuvis_ai_augment/ || true

  security:
    name: Security scanning
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run pip-audit
        # Non-blocking: torch may carry transient CVEs we cannot patch.
        run: uv run --no-sources --locked --extra dev pip-audit --strict --desc on || true

      - name: Run detect-secrets
        run: uv run --no-sources --locked --extra dev detect-secrets scan --baseline .secrets.baseline

      - name: Run bandit
        run: uv run --no-sources --locked --extra dev bandit -r cuvis_ai_augment/ -c pyproject.toml || true

  build:
    name: Build And Validate
    needs: [test, typecheck, lint, security]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build distributions
        run: uv build --no-sources

      - name: Validate distributions
        run: uv run --no-sources --with twine twine check dist/*
