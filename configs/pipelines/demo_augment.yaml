# Demo pipeline showing AugmentationCompose chained with all four V1 transforms.
# Replace the data node and downstream nodes with your real pipeline; this file
# documents the wiring shape.
nodes:
  - name: Augment
    class_name: cuvis_ai_augment.node.compose.AugmentationCompose
    hparams:
      seed: 42
      transforms:
        - {type: RandomHorizontalFlip, prob: 0.5}
        - {type: RandomVerticalFlip,   prob: 0.5}
        - {type: Random90Rotate,       prob: 0.5}
        - {type: RandomSpatialCrop,    size: [256, 256], prob: 1.0}

# Connections to a data source would look like:
# connections:
#   - {source: Data.outputs.cube, target: Augment.inputs.cube}
#   - {source: Data.outputs.mask, target: Augment.inputs.mask}
